spring.application.name=ecommerce

# Database connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=ecommerce_user
spring.datasource.password=ecommerce_password

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway migration settings
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.default-schema=public
spring.flyway.schemas=public
spring.flyway.create-schemas=false

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm123456
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Email Configuration (Mock/Console mode - no real SMTP)
# To use real SMTP, configure: spring.mail.host, spring.mail.port, etc.
# For now emails are logged to console via MockEmailSenderAdapter
app.email.enabled=true
app.email.from=noreply@ecommerce.com

# Resilience4j Configuration
# Retry for external service calls (email, payment provider)
resilience4j.retry.backend.max-attempts=3
resilience4j.retry.backend.wait-duration=500ms
resilience4j.retry.backend.retry-exceptions=java.lang.Exception

# Circuit Breaker for payment gateway
resilience4j.circuitbreaker.backend.sliding-window-size=10
resilience4j.circuitbreaker.backend.minimum-number-of-calls=5
resilience4j.circuitbreaker.backend.failure-rate-threshold=50
resilience4j.circuitbreaker.backend.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.backend.permitted-number-of-calls-in-half-open-state=3

# Time Limiter for external provider calls
resilience4j.timelimiter.backend.timeout-duration=5s
resilience4j.timelimiter.backend.cancel-running-future=true

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
