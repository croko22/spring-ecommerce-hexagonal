name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (fast lane)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run unit tests
        run: ./mvnw test -Dgroups='!integration'

  integration-tests:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run integration tests
        run: ./mvnw test -Dgroups=integration
